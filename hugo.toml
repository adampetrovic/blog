baseURL = "https://adampetrovic.me/"
theme = "hugo-bearblog"
title = "Adam’s Blog"
author = "Adam Petrovic"
copyright = "Copyright © 2026, Adam Petrovic."
locale = "en-AU"
enableRobotsTXT = true

# Bear Blog-style URLs: posts live at /post-slug/ rather than /posts/post-slug/.
disableKinds = ["taxonomy"]
ignoreErrors = ["error-disable-taxonomy"]

[permalinks]
  posts = "/:slug/"
  tags = "/blog/:slug"

[[menus.main]]
  name = "Resume"
  url = "/resume.pdf"
  weight = 30

[params]
  title = "Adam’s Blog"
  description = "Engineering, coding, homelab, and Kubernetes notes."
  hideMadeWithLine = false
  dateFormat = "2006-01-02"

[markup]
  [markup.highlight]
    style = "friendly"
    lineNos = true
    lineNumbersInTable = false
    codeFences = true
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
